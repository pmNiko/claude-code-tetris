name: Issue Analyzer — Claude

on:
  issues:
    types: [opened, edited]

jobs:
  analyze-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Analizar issue con Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools Bash(gh issue *) Bash(gh label *) Bash(cat *) Bash(printf *)'
          prompt: |
            You are an automated issue analyzer for the claude-tetris repository.
            The project is a Tetris game in vanilla JavaScript (no frameworks, no dependencies).
            Key files: game.js (all game logic, ~305 lines), index.html (300×600 px canvas), style.css (dark/retro theme).
            Main components: board, pieces (I/O/T/S/Z/J/L), scoring, rendering (Canvas 2D), controls (keyboard).

            An issue was just ${{ github.event.action }}:
            - Issue number: #${{ github.event.issue.number }}
            - Title: ${{ github.event.issue.title }}
            - Author: @${{ github.event.issue.user.login }}
            - Body: ${{ github.event.issue.body }}

            STEP 1 — Create project labels if they don't exist yet (--force skips error if already exists):
            gh label create "bug" --color "d73a4a" --description "Something is broken or behaving incorrectly" --repo ${{ github.repository }} --force
            gh label create "enhancement" --color "a2eeef" --description "New feature or improvement request" --repo ${{ github.repository }} --force
            gh label create "question" --color "d876e3" --description "Asking for help or clarification" --repo ${{ github.repository }} --force
            gh label create "documentation" --color "0052cc" --description "CLAUDE.md, README, comments" --repo ${{ github.repository }} --force
            gh label create "good first issue" --color "7057ff" --description "Simple, beginner-friendly task" --repo ${{ github.repository }} --force
            gh label create "duplicate" --color "cfd3d7" --description "Already reported or known issue" --repo ${{ github.repository }} --force
            gh label create "game-mechanics" --color "e4e669" --description "Pieces, rotation, collision, gravity" --repo ${{ github.repository }} --force
            gh label create "ui" --color "0075ca" --description "Visuals, colors, canvas, styles" --repo ${{ github.repository }} --force
            gh label create "performance" --color "f9d0c4" --description "Speed, FPS, game loop" --repo ${{ github.repository }} --force
            gh label create "scoring" --color "c5def5" --description "Score, levels, lines" --repo ${{ github.repository }} --force
            gh label create "controls" --color "bfd4f2" --description "Keyboard input, shortcuts" --repo ${{ github.repository }} --force

            STEP 2 — Add the most appropriate labels (one or more) based on the issue content:
            gh issue edit ${{ github.event.issue.number }} --add-label "LABEL1,LABEL2" --repo ${{ github.repository }}

            STEP 3 — Write the diagnosis to a temp file and post it using --body-file (required for proper Markdown rendering):

            Write your analysis to /tmp/diagnosis.md using printf with the following GitHub-Flavored Markdown structure.
            Replace every placeholder in [brackets] with real content based on the issue. Do NOT leave any placeholder as-is.

            The file must follow this exact structure:

            ## 🔍 Análisis del Issue — Claude

            | Campo | Detalle |
            |---|---|
            | **Tipo** | Bug / Enhancement / Pregunta / Documentación |
            | **Acción** | ${{ github.event.action }} |
            | **Componentes** | `board` / `pieces` / `scoring` / `rendering` / `controls` / `style` |

            ### 📋 Diagnóstico

            > [Resumen del problema en 1-2 oraciones claras]

            [Descripción completa del problema o solicitud basada en el título y cuerpo del issue]

            ### 💡 Enfoque sugerido

            [Estrategia de solución a alto nivel]

            ### 🛠️ Notas de implementación

            Archivos y funciones relevantes a modificar:

            - [ ] `game.js` — [función o sección específica si aplica]
            - [ ] `index.html` — [elemento o sección si aplica]
            - [ ] `style.css` — [regla o selector si aplica]

            ### 📊 Estimación de complejidad

            **[Baja / Media / Alta]** — [justificación breve]

            ---

            *Gracias por reportar esto, @${{ github.event.issue.user.login }}! 🎮*
            *Análisis generado automáticamente por [Claude](https://claude.ai).*

            Then post it with:
            gh issue comment ${{ github.event.issue.number }} --body-file /tmp/diagnosis.md --repo ${{ github.repository }}

            Base your entire analysis only on the issue title and body. Do not assume information not provided.
